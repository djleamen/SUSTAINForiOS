name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '34 13 * * 5'

jobs:
  analyze:
    name: Analyze
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: swift

    - name: Build Swift project
      run: |
        xcodebuild -scheme SUSTAINForiOS