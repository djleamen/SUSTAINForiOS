name: Build Swift Project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.2.app  # adjust Xcode version if needed

    - name: Build with xcodebuild
      run: |
        xcodebuild -scheme YourAppSchemeName -sdk iphoneos -configuration Release build