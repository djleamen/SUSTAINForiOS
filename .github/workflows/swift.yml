name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  build:
    runs-on: macos-latest

    strategy:
      matrix:
        xcode: [12.4, 13.2.1, 14.0.1]  # Specify compatible Xcode versions

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Xcode ${{ matrix.xcode }}
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ matrix.xcode }}

    - name: Build and test
      run: xcodebuild -project SUSTAINForiOS.xcodeproj -scheme SUSTAINForiOS -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 12,OS=14.4' build test
