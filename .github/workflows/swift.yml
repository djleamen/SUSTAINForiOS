name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Select Xcode version
      run: sudo xcode-select -s /Applications/Xcode_14.2.app/Contents/Developer
    - name: Build and test
      run: xcodebuild -scheme SUSTAINForiOS.xcodeproj -workspace YourWorkspace.xcworkspace -sdk iphonesimulator test
