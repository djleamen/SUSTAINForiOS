name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 0'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Swift
      uses: actions/setup-swift@v2
      with:
        swift-version: '5.5'

    - name: Build Swift project
      run: swift build

    - name: Run tests
      run: swift test

    - name: Upload test results
      uses: actions/upload-artifact@v2
      with:
        name: test-results
        path: path/to/test-results
