name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        xcode: [12.5, 13.2, 14.0] # Add the required Xcode version here
    steps:
    - uses: actions/checkout@v2
    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer
    - name: Build with xcodebuild
      run: xcodebuild -project SUSTAINForiOS.xcodeproj -scheme SUSTAINForiOS build
    - name: Run tests
      run: xcodebuild test -project SUSTAINForiOS.xcodeproj -scheme SUSTAINForiOS -destination 'platform=iOS Simulator,name=iPhone 12'
    - name: Upload artifacts
      uses: actions/upload-artifact@v2
      with:
        name: build
        path: build
