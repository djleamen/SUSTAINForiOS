name: CodeQL

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Check for unresolved conflicts
      run: git diff --check

    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode_12.5.app/Contents/Developer

    - name: Build and test
      run: xcodebuild -project SUSTAINForiOS.xcodeproj -scheme SUSTAINForiOS -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 12,OS=14.5' clean build test
